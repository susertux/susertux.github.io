<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Under Construction</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }
    main { max-width: 720px; }
    .kicker {
      margin: 0 0 18px;
      font-size: 0.85rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.55;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 4.8rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      line-height: 1.05;
    }
    .cursor {
      display: inline-block;
      margin-left: 0.18em;
      animation: blink 1s steps(1, end) infinite;
    }
    p {
      margin: 18px auto 0;
      font-size: 1rem;
      line-height: 1.7;
      opacity: 0.82;
      max-width: 36ch;
    }
    .glow {
      position: fixed;
      inset: auto 50% 12%;
      width: min(72vw, 700px);
      height: 180px;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 35%, rgba(255,255,255,0) 72%);
      filter: blur(30px);
      pointer-events: none;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <main>
    <p class="kicker">susertux.github.io</p>
    <h1>Under Construction<span class="cursor">_</span></h1>
    <p>Diese Seite wird gerade überarbeitet und kommt bald in einer neuen Version zurück.</p>
  </main>
</body>
</html>
